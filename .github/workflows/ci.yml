name: ci

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  tests_common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g --force corepack && corepack enable
      - uses: actions/setup-node@v5
        with: { node-version: lts/*, cache: pnpm }
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      # Lint the published package surface (exports map, file layout, metadata).
      - run: pnpm test:pkg
  tests_node:
    runs-on: ubuntu-latest
    strategy:
      # Report every Node version. Without this, the first failure cancels the
      # others and hides whether a break is version-specific.
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g --force corepack && corepack enable
      - uses: actions/setup-node@v5
        with: { node-version: "${{ matrix.node-version }}", cache: pnpm }
      - run: pnpm install
      # `srvx` self-resolves to this package (see `resolutions`), whose exports
      # map points into `dist/`. `src/loader.ts` and `src/cli/serve.ts` import
      # "srvx/node" / "srvx/static" at runtime, so the suite needs a build.
      - run: pnpm build
      # Run the whole suite. Deno/Bun suites are excluded here; they run in their
      # own jobs against the real runtime.
      - run: pnpm vitest run --coverage --exclude '**/{deno,bun}*.test.ts' test/
      - uses: codecov/codecov-action@v3
        if: matrix.node-version == 24
        with:
          token: "${{ secrets.CODECOV_TOKEN }}"
  tests_deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g --force corepack && corepack enable
      - uses: actions/setup-node@v5
        with: { node-version: lts/*, cache: pnpm }
      # TODO: 2.7.13 broke writeHead headers; 2.7.14 broke fetch body reads.
      # Pinned to last known-good (2.7.12) until upstream stabilises.
      # The `deno-latest` workflow re-tests this against the newest Deno on a
      # schedule; when it goes green, restore setup-deno below and drop the pin.
      # - uses: denoland/setup-deno@v2
      - run: mkdir -p "$HOME/.deno/bin" && curl -fsSL https://github.com/denoland/deno/releases/download/v2.7.12/deno-x86_64-unknown-linux-gnu.zip -o /tmp/deno.zip && unzip -q /tmp/deno.zip -d "$HOME/.deno/bin" && echo "$HOME/.deno/bin" >> "$GITHUB_PATH"
      - run: pnpm install
      - run: pnpm vitest run --coverage test/deno.test.ts test/deno-max-body-size.test.ts test/url.test.ts
      - run: pnpm add -D undici@^7.25.0
      - run: deno run test:node-compat:deno
  tests_bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g --force corepack && corepack enable
      - uses: actions/setup-node@v5
        with: { node-version: lts/*, cache: pnpm }
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install
      - run: pnpm vitest run --coverage test/bun.test.ts test/bun-max-body-size.test.ts test/url.test.ts
      - run: bun run test:node-compat:bun
  publish:
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    needs: [tests_common, tests_node, tests_deno, tests_bun]
    if: contains('refs/heads/main', github.ref) && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - run: npm i -fg corepack && corepack enable
      - uses: actions/setup-node@v5
        with: { node-version: lts/*, cache: "pnpm" }
      - run: pnpm install
      - run: pnpm changelogen --bump --canary nightly
      - run: npm i -g npm@latest && npm publish --tag latest
  publish-pkg-pr-new:
    runs-on: ubuntu-latest
    needs: [tests_common, tests_node, tests_deno, tests_bun]
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - run: npm i -fg corepack && corepack enable
      - uses: actions/setup-node@v6
        with: { node-version: lts/*, cache: "pnpm" }
      - run: pnpm install
      - run: pnpm build
      - run: pnpm dlx pkg-pr-new publish || true
