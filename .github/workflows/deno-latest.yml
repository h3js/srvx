# Canary: the main CI job pins Deno to 2.7.12 because 2.7.13 broke writeHead
# headers and 2.7.14 broke fetch body reads. That pin is invisible once set --
# nothing tells us when upstream fixes it.
#
# This job runs the same suites against the latest Deno and is allowed to fail.
# When it goes green, drop the pin in ci.yml and delete this workflow.
name: deno-latest

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

jobs:
  tests_deno_latest:
    runs-on: ubuntu-latest
    # Informational only: a red run here means Deno is still broken, not that
    # srvx is. It must never gate a merge or a release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - run: npm i -g --force corepack && corepack enable
      - uses: actions/setup-node@v5
        with: { node-version: lts/*, cache: pnpm }
      - uses: denoland/setup-deno@v2
        with: { deno-version: vx.x.x }
      - run: deno --version
      - run: pnpm install
      - run: pnpm vitest run test/deno.test.ts test/deno-max-body-size.test.ts test/url.test.ts
      - run: pnpm add -D undici@^7.25.0
      - run: deno run test:node-compat:deno
